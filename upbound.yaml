apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: aws-base-stack
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-helm
    version: '>=v1'
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.3'
  - apiVersion: pkg.crossplane.io/v1
    kind: Configuration
    package: ghcr.io/hops-ops/aws-pod-identity
    version: '>=v0.10.0'
  description: Installs the AWS Load Balancer Controller Helm chart with AWS Pod Identity.
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  readme: |
    # aws-base-stack

    Installs the AWS Load Balancer Controller Helm chart with AWS Pod Identity
    for automated IAM permissions.
  repository: ghcr.io/hops-ops/aws-base-stack
  source: github.com/hops-ops/aws-base-stack
