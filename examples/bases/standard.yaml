apiVersion: stacks.aws.hops.ops.com.ai/v1alpha1
kind: Base
metadata:
  name: aws-load-balancer-controller
  namespace: example-env
spec:
  clusterName: example-cluster
  labels:
    team: platform
  namespace: kube-system
  values:
    replicaCount: 2
    serviceAccount:
      create: true
      name: aws-load-balancer-controller
  aws:
    region: us-west-2
    rolePrefix: prod-
    tags:
      environment: production
